#cloud-config
# Cloud-init for Nomad server instances (ARM64)
# Installs base packages, hardens SSH, prepares for Ansible.

package_update: true
package_upgrade: true

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - jq
  - unzip
  - htop
  - tmux
  - wireguard
  - ufw

# Harden SSH
write_files:
  - path: /etc/ssh/sshd_config.d/99-hardening.conf
    content: |
      PermitRootLogin no
      PasswordAuthentication no
      PubkeyAuthentication yes
      MaxAuthTries 3
      X11Forwarding no
      AllowAgentForwarding no
      AllowTcpForwarding no
    permissions: "0644"

  - path: /etc/sysctl.d/99-meridian.conf
    content: |
      # TCP tuning for Nomad cluster
      net.core.somaxconn = 1024
      net.ipv4.tcp_max_syn_backlog = 1024
      net.ipv4.ip_forward = 1
      net.ipv4.conf.all.forwarding = 1
    permissions: "0644"

runcmd:
  # Apply sysctl
  - sysctl --system

  # Restart SSH with hardened config
  - systemctl restart sshd

  # Create Nomad directories
  - mkdir -p /opt/nomad/data
  - mkdir -p /etc/nomad.d

  # Set hostname
  - hostnamectl set-hostname nomad-server-${server_index}

  # Tag for identification
  - echo "nomad-server-${server_index}" > /etc/meridian-role

final_message: "Cloud-init complete for nomad-server-${server_index} after $UPTIME seconds"
