global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "nomad-servers"
    metrics_path: "/v1/metrics"
    params:
      format: ["prometheus"]
    static_configs:
      - targets:
          - "10.0.1.212:4646"
          - "10.0.1.144:4646"
          - "10.0.1.205:4646"
        labels:
          cluster: "meridian"
          role: "server"
